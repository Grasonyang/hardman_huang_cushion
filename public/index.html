<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive 3D Product Concept Modeling Tool</title>
    <link rel="stylesheet" href="public/styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.webgpu.js",
          "three/webgpu": "./vendor/three.webgpu.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <strong>Steady Saddle Pro</strong>
          <span>Reference-Based Procedural Model</span>
        </div>
        <div class="toolbar-actions">
          <label>
            Version
            <select id="versionSelect">
              <option value="v1">V1 concept stack</option>
              <option value="v2" selected>V2 physical PU foam</option>
            </select>
          </label>
          <label>
            Exploded
            <input id="explodedAmount" type="range" min="0" max="1.8" value="0" step="0.01">
          </label>
          <button id="resetButton" type="button">Reset</button>
          <button id="exportButton" type="button">Export JSON</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="params-panel">
          <div class="selected-card">
            <span>Selected Mesh</span>
            <strong id="selectedName">None</strong>
          </div>
          <form id="paramsForm" autocomplete="off"></form>
        </aside>

        <section class="viewport-panel">
          <div id="viewer" aria-label="WebGPU Three.js 3D product modeling canvas"></div>
          <div id="fallback" class="fallback-notice" hidden></div>
          <div class="viewport-hint">Left drag rotate · Wheel zoom · Right drag pan · Double click select mesh</div>
        </section>
      </section>

      <footer class="statusbar">
        <span>Design Version: Concept A / Procedural Geometry</span>
        <span id="rendererStatus">Renderer: initializing WebGPU</span>
      </footer>
    </main>
    <script type="module" src="./public/main.js"></script>
  </body>
</html>
